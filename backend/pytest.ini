[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
addopts = --tb=short -q --cov=. --cov-report=term-missing --cov-fail-under=80

[coverage:run]
omit =
    tests/*
    connectors/jira.py
    connectors/trello.py
    connectors/azure_devops.py
    connectors/gitlab.py
    connectors/linear.py
    connectors/shortcut.py

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    @abstractmethod
